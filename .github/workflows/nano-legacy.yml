name: Nano Legacy Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# checkout needs read; rolling the "CI-Build" prerelease (below) needs write.
# Artifact upload uses the runtime token, not these scopes. Pull-request runs
# only build + upload artifacts (the publish step is skipped for them).
permissions:
  contents: write

# Cancel an in-progress run when a newer commit is pushed to the same branch/PR,
# so a new push supersedes the build already running for the old commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Update MinGW version here
env:
  MINGW_BASE_URL: https://github.com/Alex313031/mingw-build/releases/download/20260715

jobs:
  build:
    name: Build Nano
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential g++-multilib zip unzip wget tar git patch autoconf automake autopoint pkg-config gettext

      - name: Download MinGW
        # Use our own MinGW fork for compiling Windows builds
        run: |
          wget "${MINGW_BASE_URL}/mingw_llvm_linux_i686.zip"
          wget "${MINGW_BASE_URL}/mingw_llvm_linux_x64.zip"
          unzip -o mingw_llvm_linux_i686.zip -d "$HOME"
          unzip -o mingw_llvm_linux_x64.zip -d "$HOME"
          rm -f mingw_llvm_linux_i686.zip mingw_llvm_linux_x64.zip
          # Fail fast if either cross-compiler can't run on this host.
          "$HOME/i686_llvm/bin/i686-w64-mingw32-clang" --version
          "$HOME/x64_llvm/bin/x86_64-w64-mingw32-clang" --version
          echo "$HOME/x64_llvm/bin" >> "$GITHUB_PATH"
          echo "$HOME/i686_llvm/bin" >> "$GITHUB_PATH"

      - name: Build x86 (Windows 2000+)
        run: ./build_nano.sh x86 --llvm --package

      - name: Build x64 (Windows Server 2003+)
        run: ./build_nano.sh x64 --llvm --package

      - name: Upload Build Logs
        # Builds run non-verbose, so on failure the compiler output is only in
        # the build logs -- publish them so the failure can be diagnosed. The
        # shared log covers the fetch/patch phase; each arch has its own.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            _build/build/build.log
            _build/build/*/build_*.log
          if-no-files-found: warn

      - name: Fetch Git Commit
        # On pull_request the checkout HEAD is an ephemeral merge commit, so take
        # the PR head SHA from the event; fall back to github.sha for other events.
        run: |
          SHA=${{ github.event.pull_request.head.sha || github.sha }}
          echo "SHA_SHORT=${SHA:0:6}" >> "$GITHUB_ENV"

      - name: Upload Runner Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nano_win_${{ env.SHA_SHORT}}
          path: out/nano_*.zip
          if-no-files-found: error

      - name: Upload CI-Build Pre-Release
        # Roll the fixed "CI-Build" prerelease to this commit so it always tracks
        # the latest build under a stable tag -- scripts can fetch the newest zips
        # from a constant URL (.../releases/download/CI-Build/nano_win32.zip or
        # nano_win64.zip) without knowing the commit hash. Only on pushes to main (the sole push
        # trigger) -- PRs and manual dispatch just build + upload artifacts.
        # Official releases are tagged and published manually. success() is
        # explicit because a custom if replaces the implicit success() guard.
        if: success() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build the release notes = a header line + the full commit message
          # (subject and body). %B is the raw commit message, so you can customize
          # the notes simply by writing a multi-line commit message.
          {
            echo "Automated build of commit ${{ github.sha }}"
            echo
            echo "For official releases, see the version-tagged releases on this page."
            echo "----"
            git log -1 --format='%B'
          } > release-notes.md
          # Delete the old release + tag, then recreate at the current commit so
          # the tag moves and stale assets are dropped.
          gh release delete CI-Build --cleanup-tag --yes || true
          gh release create CI-Build out/nano_*.zip \
            --target "${{ github.sha }}" \
            --title "CI Build (latest)" \
            --notes-file release-notes.md
